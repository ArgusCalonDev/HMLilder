<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q49KY3ZE3V"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}            
        gtag('js', new Date());
        gtag('config', 'G-Q49KY3ZE3V');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-3975087268988772">
    <title>HMLilder - Quick Accessibility Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/sidebar.css?v=1.0">
    <link rel="icon" type="image/x-icon" href="public/fav.ico?v=2">
    <link rel="stylesheet" href="src/quick-accessibility-checker.css?v=1.0">
</head>
<body>
    <div id="sidebar-container"></div>
    <button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>
    <script type="module" src="src/sidebar.js?v=1.5"></script>

    <script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('container');
        sidebar.classList.toggle('active');
        content.classList.toggle('shift');
    }
    </script>

    <div class="container">
        <header class="header">
            <h1 class="logo"><i class="fas fa-universal-access"></i> Quick Accessibility Checker</h1>
            <p class="tagline">Cek cepat elemen aksesibilitas HTML dasar.</p>
            <p>Baca dokumentasi: <a href="docs/docs-quick-accessibility-checker.html">klik disini</a></p>
        </header>

        <section class="generator-section">
            <div class="generator-panel">
                <h2><i class="fas fa-cogs"></i> Input HTML</h2>
                <div class="form-group">
                    <label for="accessibility-input">HTML untuk dicek:</label>
                    <textarea id="accessibility-input" rows="10" placeholder="Tempel kode HTML..."></textarea>
                </div>
                <button class="generate-btn" onclick="runAccessibilityCheck()"><i class="fas fa-magic"></i> Jalankan Check</button>
            </div>

            <div class="preview-panel">
                <h2><i class="fas fa-eye"></i> Preview</h2>
                <div class="preview-area" id="preview-area"></div>
            </div>
        </section>

        <div class="output-panel">
            <h2><i class="fas fa-code"></i> Hasil Analisis</h2>
            <div class="code-section">
                <div class="code-output" id="check-output"></div>
            </div>
        </div>
    </div>

    <script src="src/quick-accessibility-checker.js?v=1.0"></script>
</body>
</html>
